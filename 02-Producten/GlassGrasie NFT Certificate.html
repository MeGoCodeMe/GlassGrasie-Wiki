// ── Hash display ──────────────────────────────────────────────────────────────
function HashTag({ hash, label }) {
  const [copied, setCopied] = React.useState(false);
  const copy = () => {
    navigator.clipboard?.writeText(hash).catch(()=>{});
    setCopied(true); setTimeout(()=>setCopied(false),1800);
  };
  return (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontFamily:SANS,fontSize:6,letterSpacing:'2px',color:T3,textTransform:'uppercase',flexShrink:0}}>{label}</span>
      <div onClick={copy} style={{
        flex:1,fontFamily:MONO,fontSize:10,color:copied?GREEN:GOLD,
        padding:'6px 10px',background:'rgba(139,115,85,0.06)',
        border:`1px solid ${copied?GREEN:RULE}`,cursor:'pointer',
        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
        transition:'all 200ms',
      }}>
        {copied ? '✓ Gekopieerd' : hash}
      </div>
    </div>
  );
}

// ── QR placeholder ─────────────────────────────────────────────────────────────
function QRCode({ serial, size=120 }) {
  const seed = serial.split('').reduce((a,c) => a+c.charCodeAt(0),0);
  const n = 13;
  const cell = size/n;
  const dots = [];
  for (let r=0;r<n;r++) for (let c=0;c<n;c++) {
    const corner = (r<4&&c<4)||(r<4&&c>=n-4)||(r>=n-4&&c<4);
    const on = corner || ((seed*(r+1)*(c+1)*37)%97 > 46);
    if (on) dots.push({r,c});
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <rect width={size} height={size} fill="#F0EAE0"/>
      {dots.map(({r,c},i) => (
        <rect key={i} x={c*cell+0.5} y={r*cell+0.5}
          width={cell-1} height={cell-1} fill="#090806"/>
      ))}
    </svg>
  );
}

                        color:T3,textTransform:'uppercase'}}>{k}</span>
                    </div>
                  ) : (
                    <div key={k} style={{background:BG2,padding:'10px 16px',
                      display:'flex',justifyContent:'space-between',gap:12}}>
                      <span style={{fontFamily:SANS,fontSize:6,letterSpacing:'2px',
                        color:T3,textTransform:'uppercase',flexShrink:0}}>{k}</span>
                      <span style={{fontFamily:SERIF,fontStyle:'italic',fontSize:14,
                        color:T2,textAlign:'right'}}>{v}</span>
                    </div>
                  ))}
                </div>

                <div style={{textAlign:'center'}}>
                  <div style={{fontFamily:SERIF,fontSize:22,color:GOLD,fontStyle:'italic',marginBottom:4}}>
                    Glass⏧Grasie®
                  </div>
                  <div style={{fontFamily:SANS,fontSize:6,letterSpacing:'3px',color:T3,
                    textTransform:'uppercase'}}>Rotterdam, NL · {c.mintDate.slice(0,10)}</div>
                </div>
              </div>
            </div>

            <div>
              <div style={{fontFamily:SANS,fontSize:7,letterSpacing:'3px',color:GOLD,
                textTransform:'uppercase',marginBottom:20}}>Duurzaamheidsverklaring</div>
              <div style={{fontFamily:SERIF,fontSize:16,color:T3,lineHeight:1.9,marginBottom:24}}>
                Dit product is gemaakt van industrieel restfloatglas dat anders als afval zou zijn afgevoerd. Door gebruik van dit materiaal is <strong style={{color:CREAM,fontWeight:400}}>{c.glassWeightKg} kg glas gered</strong> van de grondstoffenstroom en zijn <strong style={{color:'#7A9B6A',fontWeight:400}}>{c.carbonOffsetKg} kg CO₂</strong> offset berekend op basis van vermeden productie van primair float glas.
              </div>
              <div style={{fontFamily:SERIF,fontSize:14,color:T3,fontStyle:'italic',
                lineHeight:1.8,marginBottom:32}}>
                This product is made from industrial float glass offcut that would otherwise have been disposed of as waste. By using this material, {c.glassWeightKg} kg of glass has been diverted from waste streams and {c.carbonOffsetKg} kg CO₂ offset calculated.
              </div>
              {/* Hashes */}
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <HashTag hash={c.txHash} label="TX Hash"/>
                <HashTag hash={`ipfs://${c.ipfsHash}`} label="IPFS"/>
                <HashTag hash={c.tokenId} label="Token ID"/>
              </div>
            </div>
          </div>
        )}

        {tab==='batch' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:48}}>
            <div>
              <div style={{fontFamily:SANS,fontSize:7,letterSpacing:'3px',color:GOLD,
                textTransform:'uppercase',marginBottom:20}}>Batch Data — {c.batchId}</div>
              <BatchTable c={c}/>
            </div>
            <div>
              <div style={{fontFamily:SANS,fontSize:7,letterSpacing:'3px',color:GOLD,
                textTransform:'uppercase',marginBottom:20}}>Materiaalreis</div>
              <div style={{fontFamily:SERIF,fontSize:15,color:T3,lineHeight:1.9,marginBottom:24}}>
                Run {c.batchId} begon als een afgekeurde printplaat bij Van Dijken Glas in Waddinxveen — bedrukt met het Forest Floor-motief voor een order die niet doorging. In plaats van afgevoerd te worden als industrieel glasafval, werd het materiaal overgedragen aan Glass⏧Grasie® onder de exclusiviteitsovereenkomst.
              </div>
              <div style={{fontFamily:SERIF,fontSize:14,color:T3,fontStyle:'italic',lineHeight:1.8}}>
                Run {c.batchId} started as a rejected print plate at Van Dijken Glas — printed with the Forest Floor motif for an order that was cancelled. Instead of being disposed of as industrial glass waste, the material was transferred to Glass⏧Grasie® under the exclusivity agreement.
              </div>
            </div>
          </div>
        )}

        {tab==='chain' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:64}}>
            <div>
              <div style={{fontFamily:SANS,fontSize:7,letterSpacing:'3px',color:GOLD,
                textTransform:'uppercase',marginBottom:24}}>Blockchain Audit Trail</div>
              <BlockchainChain c={c}/>
            </div>
            <div>
              <div style={{fontFamily:SANS,fontSize:7,letterSpacing:'3px',color:GOLD,
                textTransform:'uppercase',marginBottom:20}}>Verificatie</div>
              <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:32}}>
                <HashTag hash={c.txHash} label="TX Hash"/>
                <HashTag hash={c.tokenId} label="Token ID"/>
                <HashTag hash={`ipfs://${c.ipfsHash}`} label="IPFS NFT"/>
              </div>
              <div style={{padding:'20px',border:`1px solid rgba(90,154,106,0.25)`,
                background:'rgba(90,154,106,0.04)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:GREEN,
                    animation:'pulse 2s infinite'}}/>
                  <span style={{fontFamily:SANS,fontSize:7,letterSpacing:'3px',
                    color:GREEN,textTransform:'uppercase'}}>Geverifieerd</span>
                </div>
                <div style={{fontFamily:SERIF,fontSize:14,color:T3,lineHeight:1.8}}>
                  Dit certificaat is geregistreerd op het XRP Ledger en is onveranderlijk. De hash van de batch data komt overeen met het on-chain record.
                </div>
              </div>
            </div>
          </div>
        )}

        {tab==='nft' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:48}}>
            <div style={{display:'flex',justifyContent:'center'}}>
              <NFTCard c={c}/>
            </div>
            <div>
              <div style={{fontFamily:SANS,fontSize:7,letterSpacing:'3px',color:GOLD,
                textTransform:'uppercase',marginBottom:20}}>NFT Metadata</div>
              <div style={{display:'flex',flexDirection:'column',gap:1,background:RULE,marginBottom:28}}>
                {[
                  ['Naam',`${c.name} — ${c.variant}`],
                  ['Token ID',c.tokenId],
                  ['Chain',c.chain],
                  ['Contract','glassgrasie.xrp'],
                  ['Gemint',c.mintDate.replace('T',' ').slice(0,19)],
                  ['IPFS',c.ipfsHash],
                  ['Royalties','5% secundaire verkoop'],
                  ['Eigendom','Overdraagbaar · XRP wallet'],
                ].map(([k,v]) => (
                  <div key={k} style={{background:BG2,padding:'11px 16px',
                    display:'flex',justifyContent:'space-between',gap:12}}>
                    <span style={{fontFamily:SANS,fontSize:6,letterSpacing:'2px',
                      color:T3,textTransform:'uppercase',flexShrink:0}}>{k}</span>
                    <span style={{fontFamily:MONO,fontSize:10,color:T2,textAlign:'right'}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{fontFamily:SERIF,fontSize:14,color:T3,lineHeight:1.85}}>
                Het NFT certificaat wordt automatisch gemint bij aankoop en verstuurd naar het opgegeven wallet-adres. Het certificaat is onlosmakelijk verbonden aan het fysieke object via het serienummer en batch hash.
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{borderTop:`1px solid ${RULE}`,padding:'24px 40px',
        display:'flex',justifyContent:'space-between',alignItems:'center',
        background:BG2,flexWrap:'wrap',gap:12}}>
        <div style={{fontFamily:SANS,fontSize:6,letterSpacing:'3px',color:T3,textTransform:'uppercase'}}>
          © 2026 Glass⏧Grasie® Rotterdam
        </div>
        <div style={{fontFamily:MONO,fontSize:9,color:T3}}>
          glassgrasie.nl/cert/{c.serial}
        </div>
        <div style={{fontFamily:SANS,fontSize:6,letterSpacing:'2px',color:T3,textTransform:'uppercase'}}>
          XRP Ledger · IPFS · Blockchain verified
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
const NFT_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentBrightness": 100,
  "cardScale": 100,
  "darkMode": true,
  "showBlockchain": true
}/*EDITMODE-END*/;

(function() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem('gg-nft-tweaks') || '{}'); } catch {}
  const T = Object.assign({}, NFT_TWEAK_DEFAULTS, saved);

  function applyTweaks() {
    const root = document.documentElement;
    // Accent brightness filter
    document.querySelectorAll('[data-nft-card]').forEach(el => {
      el.style.filter = T.accentBrightness !== 100 ? `brightness(${T.accentBrightness/100})` : '';
    });
    // Card scale
    document.querySelectorAll('[data-nft-card]').forEach(el => {
      el.style.transform = T.cardScale !== 100 ? `scale(${T.cardScale/100})` : '';
      el.style.transformOrigin = 'top left';
    });
    // Blockchain badge
    const badge = document.querySelector('[data-blockchain-badge]');
    if (badge) badge.style.display = T.showBlockchain ? '' : 'none';
    // Dark/light
    if (!T.darkMode) {
      root.style.setProperty('background','#F0EAE0');
      document.body.style.background = '#F0EAE0';
    } else {
      document.body.style.background = '';
    }
  }

  const panel = document.createElement('div');
  panel.id = 'nft-tweaks';
  panel.style.cssText = 'display:none;position:fixed;bottom:24px;right:24px;z-index:9999;width:250px;background:#0A0908;border:1px solid #2C2418;font-family:\'Cormorant Garamond\',serif;color:#E8E2D8;box-shadow:0 8px 40px rgba(0,0,0,0.7);';
  panel.innerHTML = `
    <div style="padding:14px 18px 10px;border-bottom:1px solid #1C1810;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Syncopate',sans-serif;font-size:7px;letter-spacing:4px;color:#C9A87C;text-transform:uppercase;">Tweaks</span>
      <span style="font-family:'Syncopate',sans-serif;font-size:6px;letter-spacing:2px;color:#5A5044;">NFT Certificaat</span>
    </div>
    <div style="padding:16px 18px;display:flex;flex-direction:column;gap:16px;">
      <div>
        <label style="font-family:'Syncopate',sans-serif;font-size:6px;letter-spacing:3px;color:#8A8070;text-transform:uppercase;display:block;margin-bottom:8px;">Accent helderheid <span id="nft-bright-val">${T.accentBrightness}</span>%</label>
        <input id="nft-bright" type="range" min="60" max="160" step="5" value="${T.accentBrightness}" style="width:100%;accent-color:#C9A87C;cursor:pointer;">
      </div>
      <div>
        <label style="font-family:'Syncopate',sans-serif;font-size:6px;letter-spacing:3px;color:#8A8070;text-transform:uppercase;display:block;margin-bottom:8px;">Kaart schaal <span id="nft-scale-val">${T.cardScale}</span>%</label>
        <input id="nft-scale" type="range" min="70" max="130" step="5" value="${T.cardScale}" style="width:100%;accent-color:#C9A87C;cursor:pointer;">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:4px;border-top:1px solid #1C1810;">
        <span style="font-family:'Syncopate',sans-serif;font-size:6px;letter-spacing:3px;color:#8A8070;text-transform:uppercase;">Blockchain badge</span>
        <button id="nft-chain" style="padding:5px 12px;font-family:'Syncopate',sans-serif;font-size:5px;letter-spacing:2px;border:1px solid #C9A87C;background:transparent;color:#C9A87C;cursor:pointer;text-transform:uppercase;">${T.showBlockchain ? 'Aan':'Uit'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(panel);

  panel.querySelector('#nft-bright').addEventListener('input', e => {
    T.accentBrightness = +e.target.value;
    panel.querySelector('#nft-bright-val').textContent = T.accentBrightness;
    try { localStorage.setItem('gg-nft-tweaks', JSON.stringify(T)); } catch {}
    applyTweaks();
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: T }, '*');
  });
  panel.querySelector('#nft-scale').addEventListener('input', e => {
    T.cardScale = +e.target.value;
    panel.querySelector('#nft-scale-val').textContent = T.cardScale;
    try { localStorage.setItem('gg-nft-tweaks', JSON.stringify(T)); } catch {}
    applyTweaks();
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: T }, '*');
  });
  panel.querySelector('#nft-chain').addEventListener('click', () => {
    T.showBlockchain = !T.showBlockchain;
    panel.querySelector('#nft-chain').textContent = T.showBlockchain ? 'Aan' : 'Uit';
    try { localStorage.setItem('gg-nft-tweaks', JSON.stringify(T)); } catch {}
    applyTweaks();
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: T }, '*');
  });

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode')   panel.style.display = 'block';
    if (e.data?.type === '__deactivate_edit_mode') panel.style.display = 'none';
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  setTimeout(applyTweaks, 600);
})();
</script>
</body>
</html>
