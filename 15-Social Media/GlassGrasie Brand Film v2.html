// ── GlassShard ─────────────────────────────────────────────────────────────
function GlassShard({ d, lit, progress, driftY = 0 }) {
  const appear = Math.min(1, progress * 2.5);
  const slowRot = progress * d.r * 0.12;
  const drift = progress * 28 + driftY;
  const color = lit ? d.lc : d.bc;
  return (
    <div style={{
      position:'absolute', left:d.x, top: d.y - drift,
      width:d.s, height:d.s,
      opacity: appear,
      transform:`rotate(${d.r + slowRot}deg)`,
      pointerEvents:'none', willChange:'transform,opacity',
    }}>
      <svg viewBox="0 0 100 100" width={d.s} height={d.s}>
        <defs>
          <linearGradient id={`gl${d.id}`} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="rgba(255,255,255,0.18)"/>
            <stop offset="100%" stopColor="rgba(255,255,255,0.01)"/>
          </linearGradient>
        </defs>
        <polygon points={SHAPES[d.sh]} fill={color} stroke="rgba(255,255,255,0.10)" strokeWidth="0.7"/>
        <polygon points={SHAPES[d.sh]} fill={`url(#gl${d.id})`}/>
      </svg>
    </div>
  );
}

// ── Scene 1 — Waste (0–15s) ────────────────────────────────────────────────
function Scene1() {

// ── Scene 2 — Transformation (15–32s) ─────────────────────────────────────

          position:'absolute', left:'50%', top:'50%',

        <GlassShard key={d.id} d={d} lit={true}
          progress={clamp((lt - 0.3 - d.id*0.12)/2.5, 0, 1)}
          driftY={lt * 2.5}/>

      {showNL && <div style={{
        position:'absolute', left:'50%', top:'35%',
        transform:`translateX(-50%) translateY(${(1-textP)*26}px)`,
        opacity:textP, textAlign:'center', willChange:'transform,opacity',

        position:'absolute', left:'50%', top: showNL ? '57%' : '38%',

        opacity:text2P * (showNL ? 0.5 : 0.95), textAlign:'center',

          fontWeight:300, letterSpacing:'0.22em', textTransform: showNL ? 'uppercase' : 'none',
          fontStyle: showNL ? 'normal' : 'italic'}}>
          {showNL ? 'We keep it.' : '...we keep it.'}
        </div>
      </div>}
      {[
        {nl:'Precies gemaakt.',en:'Exactly crafted.',p:p1},
        {nl:'Traceerbaar.',    en:'Traceable.',      p:p2},
        {nl:'Uniek.',         en:'Unique.',          p:p3},

          position:'absolute', left:'50%', top:`${68+i*7.5}%`,
          transform:`translateX(-50%) translateY(${(1-item.p)*14}px)`,
          opacity:item.p, textAlign:'center',

          willChange:'transform,opacity',

          {showNL && <span style={{fontFamily:SERIF,fontSize:30,color:CREAM,fontWeight:400}}>{item.nl}</span>}

// ── Scene 5 — Mascot + Logo (72–90s) ──────────────────────────────────────

  const logoP    = Easing.easeOutBack(clamp((lt - 3.5) / 2.2, 0, 1));
  const taglineP = Easing.easeOutCubic(clamp((lt - 6) / 1.8, 0, 1));
  const subP     = Easing.easeOutCubic(clamp((lt - 7.8) / 1.4, 0, 1));
  const siteP    = Easing.easeOutCubic(clamp((lt - 11) / 1.2, 0, 1));
  const zoom = 1 + mascotP * 0.03;
  const showNL = taal !== 'en';
  const showEN = taal !== 'nl';
  return (
    <Sprite start={72} end={90}>
      <div style={{position:'absolute',inset:0,
        background:`radial-gradient(ellipse 65% 65% at 32% 100%,
          oklch(22% 0.07 82) 0%,
          oklch(12% 0.03 82) 45%,
          ${DARK} 70%)`,
        opacity:bgP}}/>
      {SHARDS.slice(0,6).map(d => (
        <GlassShard key={d.id}
          d={{...d, x:d.x*0.45+50, y:d.y*0.6+100, s:d.s*0.7}}
          lit={true} progress={clamp((lt-2)/5,0,1)}/>
      ))}
      {/* Mascot */}
      <div style={{
        position:'absolute', right: 80 + (1-mascotP)*220,
        bottom:0, width:560,
        opacity: mascotP,
        transform:`scale(${zoom})`, transformOrigin:'bottom center',
        willChange:'transform,opacity',
      }}>
        <img src={mascotSrc} alt="Glass⏧Grasie mascot"
          style={{width:'100%',objectFit:'contain',display:'block'}}/>
      </div>
      {/* Logo wordmark */}
      <div style={{
        position:'absolute', left:130, top:'22%',
        transform:`translateY(${(1-logoP)*32}px)`,
        opacity:logoP, willChange:'transform,opacity',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:28}}>
          <svg width="38" height="38" viewBox="0 0 38 38">
            <polygon points="19,2 36,19 19,36 2,19" fill="none" stroke={accent.hi} strokeWidth="1.4"/>
            <polygon points="19,8 30,19 19,30 8,19" fill={accent.hi} opacity="0.18"/>
          </svg>
          <div style={{width:1,height:32,background:'rgba(210,175,80,0.25)'}}/>
          <div style={{fontFamily:SANS,fontSize:10,color:accent.hi,letterSpacing:'0.28em',textTransform:'uppercase',opacity:0.7}}>
            Rotterdam, NL · Est. 2025
          </div>
        </div>
        <div style={{fontFamily:LOGO_FONT,fontSize:108,color:CREAM,fontWeight:400,letterSpacing:'-0.05em',lineHeight:0.92,position:'relative'}}>
          Glass⏧Grasie
          <span style={{fontFamily:SERIF,fontSize:24,color:accent.hi,verticalAlign:'super',marginLeft:4}}>®</span>
        </div>
      </div>
      {/* Tagline NL */}
      {showNL && <div style={{
        position:'absolute', left:133, top:'calc(22% + 188px)',
        transform:`translateY(${(1-taglineP)*16}px)`,
        opacity:taglineP, willChange:'transform,opacity',
      }}>
        <div style={{fontFamily:SANS,fontSize:28,color:CREAM,fontWeight:300,letterSpacing:'0.07em'}}>
          Geconstrueerd glas uit Rotterdam.
        </div>
      </div>}
      {/* English */}
      {showEN && <div style={{
        position:'absolute', left:134,
        top: showNL ? 'calc(22% + 232px)' : 'calc(22% + 188px)',
        opacity: showNL ? subP * 0.38 : taglineP,
      }}>
        <div style={{fontFamily:SANS,fontSize: showNL ? 17 : 28,color:CREAM,fontWeight:300,letterSpacing:'0.14em',textTransform:'uppercase'}}>
          Constructed glass from Rotterdam.
        </div>
      </div>}
      <div style={{
        position:'absolute', left:133, top:'calc(22% + 272px)',
        opacity: taglineP * 0.3, display:'flex', alignItems:'center', gap:12,
      }}>
        <div style={{width:44,height:1,background:accent.hi}}/>
        <svg width="8" height="8" viewBox="0 0 8 8">
          <polygon points="4,0 8,4 4,8 0,4" fill={accent.hi}/>
        </svg>
        <div style={{width:44,height:1,background:accent.hi}}/>
      </div>
      <div style={{position:'absolute',left:133,bottom:70,opacity:siteP * 0.3}}>
        <div style={{fontFamily:SANS,fontSize:15,color:CREAM,letterSpacing:'0.24em',textTransform:'uppercase'}}>
          glassgrasie.nl
        </div>
      </div>
    </Sprite>
  );
}

// ── Flash transition ───────────────────────────────────────────────────────
function Flash({ at, dur=0.45 }) {
  const t = useTime();
  const d = Math.abs(t - at);
  const op = d < dur ? (1 - d/dur) * (1 - d/dur) * 0.9 : 0;
  if (op < 0.01) return null;
  return <div style={{position:'absolute',inset:0,background:'#000',opacity:op,pointerEvents:'none'}}/>;
}

// ── Timestamp screen label ─────────────────────────────────────────────────
function TSLabel() {
  const t = useTime();
  const sec = Math.floor(t);
  return <div data-screen-label={`${sec}s`} style={{position:'absolute',inset:0,pointerEvents:'none'}}/>;
}

// ── Tweaks Panel ───────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, update, visible }) {
  if (!visible) return null;
  const panelStyle = {
    position:'fixed', bottom:60, right:16, zIndex:9999,
    background:'rgba(12,11,8,0.97)', border:'1px solid rgba(210,175,80,0.25)',
    padding:'20px 22px', width:260, fontFamily:SANS,
    boxShadow:'0 8px 32px rgba(0,0,0,0.6)',
  };
  const labelStyle = { fontSize:7, letterSpacing:'3px', color:'rgba(210,175,80,0.6)',
    textTransform:'uppercase', marginBottom:8, display:'block' };
  const rowStyle = { marginBottom:18 };
  const btnGroupStyle = { display:'flex', gap:4, flexWrap:'wrap' };
  const btn = (key, val, label) => {
    const active = tweaks[key] === val;
    return <button key={val} onClick={() => update(key, val)} style={{
      fontFamily:SANS, fontSize:7, letterSpacing:'2px', textTransform:'uppercase',
      padding:'6px 10px', cursor:'pointer',
      background: active ? 'rgba(210,175,80,0.18)' : 'rgba(255,255,255,0.04)',
      border: active ? '1px solid rgba(210,175,80,0.5)' : '1px solid rgba(255,255,255,0.08)',
      color: active ? 'oklch(72% 0.13 82)' : 'rgba(232,226,216,0.5)',
      transition:'all 150ms',
    }}>{label}</button>;
  };
  return (
    <div style={panelStyle}>
      <div style={{fontFamily:SANS,fontSize:8,letterSpacing:'4px',color:'oklch(72% 0.13 82)',
        textTransform:'uppercase',marginBottom:18,paddingBottom:12,
        borderBottom:'1px solid rgba(255,255,255,0.07)'}}>Tweaks</div>

      <div style={rowStyle}>
        <span style={labelStyle}>Karakter</span>
        <div style={btnGroupStyle}>
          {btn('karakter','3d','3D Karakter')}
          {btn('karakter','anime','Anime')}
        </div>
      </div>

      <div style={rowStyle}>
        <span style={labelStyle}>Taal</span>
        <div style={btnGroupStyle}>
          {btn('taal','nl','NL')}
          {btn('taal','en','EN')}
          {btn('taal','beide','Beide')}
        </div>
      </div>

      <div style={rowStyle}>
        <span style={labelStyle}>Accent kleur</span>
        <div style={btnGroupStyle}>
          {btn('accentKleur','goud-warm','Goud')}
          {btn('accentKleur','goud-koel','Blauw')}
          {btn('accentKleur','zilver','Zilver')}
          {btn('accentKleur','koper','Koper')}
        </div>
      </div>

      <div style={rowStyle}>
        <span style={labelStyle}>Tempo</span>
        <div style={btnGroupStyle}>
          {btn('tempo','snel','Snel')}
          {btn('tempo','normaal','Normaal')}
          {btn('tempo','langzaam','Langzaam')}
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try {
      const saved = localStorage.getItem('gg-tweaks-v2');
      return saved ? {...TWEAK_DEFAULTS, ...JSON.parse(saved)} : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const [panelVisible, setPanelVisible] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setPanelVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setPanelVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (key, val) => {
    const next = {...tweaks, [key]: val};
    setTweaks(next);
    localStorage.setItem('gg-tweaks-v2', JSON.stringify(next));
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[key]: val}}, '*');
  };

  const duration = TEMPO_MAP[tweaks.tempo] || 90;

  return (
    <TweakCtx.Provider value={tweaks}>
      <Stage width={1920} height={1080} duration={duration} background={DARK}
        persistKey="gg-brand-v2" loop={false} autoplay={true}>
        <Scene1/>
        <Scene2/>
        <Scene3/>
        <Scene4/>
        <Scene5/>
        <Flash at={15}/>
        <Flash at={32}/>
        <Flash at={55}/>
        <Flash at={72}/>
        <TSLabel/>
      </Stage>
      <TweaksPanel tweaks={tweaks} update={update} visible={panelVisible}/>
    </TweakCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
