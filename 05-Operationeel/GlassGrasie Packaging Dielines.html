<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glass⏧Grasie® — Verpakking Dieline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { width:100%; height:100%; background:#1a1a1a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

const S = "'Syncopate',sans-serif";
const R = "'Cormorant Garamond',Georgia,serif";
const M = "'JetBrains Mono',ui-monospace,monospace";
const BG = '#0D0C0B'; const GOLD_HI = '#C9A87C'; const GOLD = '#8B7355';
const CREAM = '#E8E2D8'; const T4 = '#5A5044'; const T5 = '#3A3020';
const PAPER = '#F0EAE0'; const CUT = '#FF3B30'; const FOLD = '#2196F3'; const PRINT = '#0D0C0B';

const Legend = () => (
  <div style={{display:'flex',gap:20,padding:'10px 14px',background:'#fff',borderTop:'1px solid #e0e0e0',flexWrap:'wrap'}}>
    {[[CUT,'Snijlijn (CUT)'],[FOLD,'Vouwlijn (FOLD)'],['#999','Bedrukgebied']].map(([c,l])=>(
      <div key={l} style={{display:'flex',alignItems:'center',gap:6}}>
        <div style={{width:24,height:2,background:c,borderStyle:c===FOLD?'dashed':'solid'}}/>
        <span style={{fontFamily:M,fontSize:9,color:'#444'}}>{l}</span>
      </div>
    ))}
  </div>
);

// ── Small Product Box Dieline (120×80×40mm) ──────────────────────────────────
// Flat layout: Top=40, Bottom=40, Left=80, Right=80, Front=120, Back=120
// W = left_flap(40) + front(120) + right_flap(40) + back(120) + glue(20) = 340
// H = top_flap(40) + height(80) + bottom_flap(40) = 160
const SmallBoxDieline = () => {
  const scale = 1.8; // 1mm = 1.8px
  const W=120,H=80,D=40,G=20;
  const TW=(D+W+D+W+G)*scale, TH=(D+H+D)*scale;
  const px=x=>x*scale, py=y=>y*scale;
  const lf=D, fr=D+W, rf=D+W+D, bk=D+W+D+W;

  return (
    <div style={{width:'100%',height:'100%',background:'#fff',overflow:'auto'}}>
      <Legend/>
      <div style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontFamily:S,fontSize:7,letterSpacing:'3px',color:'#666',textTransform:'uppercase'}}>
          Productdoos — 120×80×40mm · schaal 1:1 (1mm=1.8px)
        </div>
        <svg width={TW+40} height={TH+40} viewBox={`-20 -20 ${TW+40} ${TH+40}`}
          style={{display:'block',maxWidth:'100%'}}>

          {/* ── Print areas (light fill) ── */}
          {/* Left flap */}
          <rect x={0} y={py(D)} width={px(lf)} height={px(H)} fill="#f8f5f0" stroke="none"/>
          {/* Front */}
          <rect x={px(lf)} y={py(D)} width={px(W)} height={px(H)} fill="#F0EAE0" stroke="none"/>
          {/* Right flap */}
          <rect x={px(fr)} y={py(D)} width={px(D)} height={px(H)} fill="#f8f5f0" stroke="none"/>
          {/* Back */}
          <rect x={px(rf)} y={py(D)} width={px(W)} height={px(H)} fill="#f8f5f0" stroke="none"/>
          {/* Glue strip */}
          <rect x={px(bk)} y={py(D)} width={px(G)} height={px(H)} fill="#ffe0d0" stroke="none" opacity="0.5"/>
          {/* Top flaps */}
          <rect x={px(lf)} y={0} width={px(W)} height={py(D)} fill="#f5f2ed" stroke="none"/>
          <rect x={px(rf)} y={0} width={px(W)} height={py(D)} fill="#f5f2ed" stroke="none"/>
          {/* Bottom flaps */}
          <rect x={px(lf)} y={py(D+H)} width={px(W)} height={py(D)} fill="#f5f2ed" stroke="none"/>
          <rect x={px(rf)} y={py(D+H)} width={px(W)} height={py(D)} fill="#f5f2ed" stroke="none"/>

          {/* ── Brand print on Front ── */}
          <text x={px(lf+W/2)} y={py(D+H/2-8)} textAnchor="middle"
            fontFamily={S} fontWeight="700" fontSize={px(6)} letterSpacing={px(1.5)} fill={PRINT}>
            GLASS⏧GRASIE®
          </text>
          <text x={px(lf+W/2)} y={py(D+H/2+2)} textAnchor="middle"
            fontFamily={M} fontSize={px(4)} fill="#8B7355">
            Rotterdam · glassgrasie.nl
          </text>
          {/* Diamond on front */}
          <polygon points={`${px(lf+W/2)},${py(D+H/2+10)} ${px(lf+W/2+5)},${py(D+H/2+15)} ${px(lf+W/2)},${py(D+H/2+20)} ${px(lf+W/2-5)},${py(D+H/2+15)}`}
            fill="none" stroke="#C9A87C" strokeWidth="0.8"/>

          {/* ── Fold lines (dashed blue) ── */}
          <line x1={px(lf)} y1={0} x2={px(lf)} y2={TH} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>
          <line x1={px(fr)} y1={0} x2={px(fr)} y2={TH} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>
          <line x1={px(rf)} y1={0} x2={px(rf)} y2={TH} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>
          <line x1={px(bk)} y1={0} x2={px(bk)} y2={TH} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>
          <line x1={0} y1={py(D)} x2={TW} y2={py(D)} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>
          <line x1={0} y1={py(D+H)} x2={TW} y2={py(D+H)} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>

          {/* ── Cut line (solid red) ── */}
          <path d={`M ${px(lf)} 0 H ${px(bk+G)} M 0 ${py(D)} V ${py(D+H)} H ${px(lf)} M ${px(fr)} 0 V ${py(D)} M ${px(rf)} 0 V ${py(D)} M ${px(fr)} ${TH} V ${py(D+H)} M ${px(rf)} ${TH} V ${py(D+H)} M ${px(bk+G)} ${py(D)} V ${py(D+H)} M 0 ${py(D)} H ${px(lf)} M 0 ${py(D+H)} H ${px(lf)} M ${px(bk+G)} ${py(D)} H ${TW}`}
            stroke={CUT} strokeWidth="1" fill="none"/>
          {/* Outer cut rectangle */}
          <rect x={px(lf)} y={0} width={px(W)} height={py(D)} stroke={CUT} strokeWidth="1" fill="none"/>
          <rect x={px(rf)} y={0} width={px(W)} height={py(D)} stroke={CUT} strokeWidth="1" fill="none"/>
          <rect x={px(lf)} y={py(D+H)} width={px(W)} height={py(D)} stroke={CUT} strokeWidth="1" fill="none"/>
          <rect x={px(rf)} y={py(D+H)} width={px(W)} height={py(D)} stroke={CUT} strokeWidth="1" fill="none"/>
          <rect x={0} y={py(D)} width={px(lf)} height={px(H)} stroke={CUT} strokeWidth="1" fill="none"/>
          <rect x={px(fr)} y={py(D)} width={px(D)} height={px(H)} stroke={CUT} strokeWidth="1" fill="none"/>
          <rect x={px(bk)} y={py(D)} width={px(G)} height={px(H)} stroke={CUT} strokeWidth="1" fill="none" strokeDasharray="3 2"/>

          {/* ── Dimension labels ── */}
          {[
            [px(lf),px(fr),py(-14),`${W}mm Front`],
            [px(rf),px(bk),py(-14),`${W}mm Back`],
            [px(0),px(lf),py(-14),`${D}mm`],
            [px(fr),px(rf),py(-14),`${D}mm`],
          ].map(([x1,x2,y,label],i)=>(
            <g key={i}>
              <line x1={x1} y1={y+4} x2={x2} y2={y+4} stroke="#999" strokeWidth="0.5"/>
              <line x1={x1} y1={y} x2={x1} y2={y+8} stroke="#999" strokeWidth="0.5"/>
              <line x1={x2} y1={y} x2={x2} y2={y+8} stroke="#999" strokeWidth="0.5"/>
              <text x={(x1+x2)/2} y={y-2} textAnchor="middle" fontFamily={M} fontSize={7} fill="#888">{label}</text>
            </g>
          ))}
          {[
            [px(-14),py(D),py(D+H),`${H}mm`],
            [px(-14),py(0),py(D),`${D}mm`],
          ].map(([x,y1,y2,label],i)=>(
            <g key={i}>
              <line x1={x+4} y1={y1} x2={x+4} y2={y2} stroke="#999" strokeWidth="0.5"/>
              <text x={x-2} y={(y1+y2)/2} textAnchor="middle" fontFamily={M} fontSize={7} fill="#888" transform={`rotate(-90,${x-2},${(y1+y2)/2})`}>{label}</text>
            </g>
          ))}

          {/* ── Face labels ── */}
          {[
            [px(lf/2),py(D+H/2),'LINKS'],
            [px(lf+W/2),py(D+H/2-20),'VOOR'],
            [px(fr+D/2),py(D+H/2),'RECHTS'],
            [px(rf+W/2),py(D+H/2),'ACHTERKANT'],
            [px(bk+G/2),py(D+H/2),'LIM'],
          ].map(([x,y,l])=>(
            <text key={l} x={x} y={y} textAnchor="middle" fontFamily={M} fontSize={7} fill="#bbb" opacity="0.7">{l}</text>
          ))}
        </svg>

        {/* Spec table */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:1,background:'#e0e0e0',maxWidth:500}}>
          {[['Formaat','120 × 80 × 40mm'],['Materiaal','350gsm karton, mat'],['Bedrukking','1 kleur zwart + goudfolie lid'],['Afwerking','Mat laminaat'],['Snijvorm','Tussenvorm uitsnede'],['Schaal','1:1 (export @300dpi)']].map(([k,v])=>(
            <React.Fragment key={k}>
              <div style={{background:'#f5f5f5',padding:'7px 10px',fontFamily:M,fontSize:9,color:'#666'}}>{k}</div>
              <div style={{background:'#fff',padding:'7px 10px',fontFamily:M,fontSize:9,color:'#222'}}>{v}</div>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Hangtag Dieline ──────────────────────────────────────────────────────────
const HangtagDieline = () => {
  const sc=2.8, W=50, H=80, holeR=3;
  return (
    <div style={{width:'100%',height:'100%',background:'#fff',overflow:'auto'}}>
      <Legend/>
      <div style={{padding:16,display:'flex',gap:32,flexWrap:'wrap'}}>
        <div>
          <div style={{fontFamily:S,fontSize:7,letterSpacing:'3px',color:'#666',textTransform:'uppercase',marginBottom:10}}>
            Hangtag — 50×80mm
          </div>
          <svg width={W*sc+40} height={H*sc+40} viewBox={`-20 -20 ${W*sc+40} ${H*sc+40}`}>
            {/* Print front area */}
            <rect x={0} y={0} width={W*sc} height={H*sc} fill="#F0EAE0"/>
            {/* Hole */}
            <circle cx={W*sc/2} cy={holeR*sc+4} r={holeR*sc} fill="#fff" stroke="#999" strokeWidth="0.8"/>
            {/* Brand print */}
            <text x={W*sc/2} y={H*sc/2-12} textAnchor="middle" fontFamily={S} fontWeight="700" fontSize={8} letterSpacing="2" fill={BG}>G⏧G</text>
            <text x={W*sc/2} y={H*sc/2} textAnchor="middle" fontFamily={M} fontSize={6} fill="#8B7355">glassgrasie.nl</text>
            <text x={W*sc/2} y={H*sc*0.8} textAnchor="middle" fontFamily={M} fontSize={5.5} fill="#5A5044">€ 145</text>
            {/* Cut line */}
            <rect x={0} y={0} width={W*sc} height={H*sc} stroke={CUT} strokeWidth="1" fill="none"/>
            {/* Fold — score line for top curve */}
            <line x1={0} y1={(holeR*2+6)*sc} x2={W*sc} y2={(holeR*2+6)*sc} stroke={FOLD} strokeWidth="0.6" strokeDasharray="3 3"/>
            {/* Hole cut */}
            <circle cx={W*sc/2} cy={holeR*sc+4} r={holeR*sc} stroke={CUT} strokeWidth="1" fill="none"/>
            {/* Dims */}
            <line x1={-12} y1={0} x2={-12} y2={H*sc} stroke="#ccc" strokeWidth="0.5"/>
            <text x={-14} y={H*sc/2} textAnchor="middle" fontFamily={M} fontSize={6.5} fill="#aaa" transform={`rotate(-90,-14,${H*sc/2})`}>{H}mm</text>
            <line x1={0} y1={H*sc+12} x2={W*sc} y2={H*sc+12} stroke="#ccc" strokeWidth="0.5"/>
            <text x={W*sc/2} y={H*sc+20} textAnchor="middle" fontFamily={M} fontSize={6.5} fill="#aaa">{W}mm</text>
          </svg>
        </div>

        {/* Specs */}
        <div style={{display:'flex',flexDirection:'column',gap:1,background:'#e0e0e0',alignSelf:'flex-start',minWidth:220}}>
          {[['Formaat','50 × 80mm'],['Gat diameter','6mm (⌀)'],['Materiaal','300gsm kraftkarton, creme'],['Bedrukking','1+1 (zwart voor, herkomst achter)'],['Afwerking','Geen — naturel kraft'],['Ophangen','Zwart satijn lint 3mm'],['Snijvorm','Stansen + gaatjespons']].map(([k,v])=>(
            <React.Fragment key={k}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr'}}>
                <div style={{background:'#f5f5f5',padding:'6px 10px',fontFamily:M,fontSize:8,color:'#666'}}>{k}</div>
                <div style={{background:'#fff',padding:'6px 10px',fontFamily:M,fontSize:8,color:'#222'}}>{v}</div>
              </div>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Business Card Dieline ─────────────────────────────────────────────────────
const BusinessCardDieline = () => {
  const sc=2.4, W=85, H=55, bleed=3;
  const TW=(W+bleed*2)*sc, TH=(H+bleed*2)*sc;
  return (
    <div style={{width:'100%',height:'100%',background:'#fff',overflow:'auto'}}>
      <Legend/>
      <div style={{padding:16}}>
        <div style={{fontFamily:S,fontSize:7,letterSpacing:'3px',color:'#666',textTransform:'uppercase',marginBottom:12}}>
          Visitekaartje — 85×55mm + 3mm afloop
        </div>
        <svg width={TW+48} height={TH+48} viewBox={`-24 -24 ${TW+48} ${TH+48}`}>
          {/* Bleed area */}
          <rect x={0} y={0} width={TW} height={TH} fill="#ffe5e5" opacity="0.3"/>
          {/* Safe area */}
          <rect x={bleed*sc} y={bleed*sc} width={W*sc} height={H*sc} fill={BG}/>
          {/* Brand print */}
          <text x={TW/2} y={TH/2-8} textAnchor="middle" fontFamily={S} fontWeight="700" fontSize={10} letterSpacing="4" fill={CREAM}>GLASS⏧GRASIE</text>
          <text x={bleed*sc+10} y={TH-bleed*sc-18} fontFamily={M} fontSize={7} fill="#5A5044">sergio@glassgrasie.nl</text>
          <text x={bleed*sc+10} y={TH-bleed*sc-8} fontFamily={M} fontSize={7} fill="#5A5044">glassgrasie.nl</text>
          {/* Cut line */}
          <rect x={0} y={0} width={TW} height={TH} stroke={CUT} strokeWidth="1.2" fill="none"/>
          {/* Safe zone */}
          <rect x={bleed*sc} y={bleed*sc} width={W*sc} height={H*sc} stroke={FOLD} strokeWidth="0.7" strokeDasharray="4 3" fill="none"/>
          {/* Dim lines */}
          <line x1={0} y1={TH+16} x2={TW} y2={TH+16} stroke="#ccc" strokeWidth="0.5"/>
          <text x={TW/2} y={TH+26} textAnchor="middle" fontFamily={M} fontSize={7} fill="#aaa">{W+bleed*2}mm (incl. afloop)</text>
          <line x1={TW+16} y1={0} x2={TW+16} y2={TH} stroke="#ccc" strokeWidth="0.5"/>
          <text x={TW+24} y={TH/2} textAnchor="middle" fontFamily={M} fontSize={7} fill="#aaa" transform={`rotate(90,${TW+24},${TH/2})`}>{H+bleed*2}mm</text>
          {/* Annotations */}
          <text x={2} y={-8} fontFamily={M} fontSize={6} fill="#FF3B30">← Afloop 3mm</text>
          <text x={bleed*sc+2} y={bleed*sc-3} fontFamily={M} fontSize={6} fill={FOLD}>Safe zone</text>
        </svg>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:1,background:'#e0e0e0',maxWidth:480,marginTop:16}}>
          {[['Formaat','85 × 55mm (standaard)'],['Afloop','3mm rondom'],['Safe zone','4mm van rand'],['Materiaal','350gsm, mat/silk laminaat'],['Bedrukking','4/4 CMYK + spot UV lid'],['Afwerking','Enkelzijdig mat laminaat + voorzijde spot UV op ⏧']].map(([k,v])=>(
            <React.Fragment key={k}>
              <div style={{background:'#f5f5f5',padding:'6px 10px',fontFamily:M,fontSize:8,color:'#666'}}>{k}</div>
              <div style={{background:'#fff',padding:'6px 10px',fontFamily:M,fontSize:8,color:'#222'}}>{v}</div>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Sticker Sheet ─────────────────────────────────────────────────────────────
const StickerSheetDieline = () => (
  <div style={{width:'100%',height:'100%',background:'#fff',overflow:'auto',padding:16}}>
    <Legend/>
    <div style={{marginTop:12}}>
      <div style={{fontFamily:S,fontSize:7,letterSpacing:'3px',color:'#666',textTransform:'uppercase',marginBottom:12}}>
        Stickervel A4 — 4 varianten × 3 stuks = 12 stickers
      </div>
      <svg width={560} height={440} viewBox="0 0 560 440">
        <rect width={560} height={440} fill="#f9f9f9"/>
        {/* A4 outline */}
        <rect x={20} y={20} width={520} height={400} stroke={CUT} strokeWidth="1.2" fill="none"/>
        {/* Round stickers — row 1 */}
        {[0,1,2].map(i=>{
          const cx=90+i*160, cy=90;
          return <g key={i}>
            <circle cx={cx} cy={cy} r={55} fill={BG} stroke={CUT} strokeWidth="1"/>
            <circle cx={cx} cy={cy} r={50} fill="none" stroke={FOLD} strokeWidth="0.5" strokeDasharray="3 2"/>
            <text x={cx} y={cy-8} textAnchor="middle" fontFamily={S} fontSize={8} letterSpacing="2" fill={CREAM}>G⏧G</text>
            <text x={cx} y={cy+6} textAnchor="middle" fontFamily={M} fontSize={5.5} fill="#8B7355">ROTTERDAM</text>
          </g>;
        })}
        {/* Rect stickers — row 2 */}
        {[0,1,2].map(i=>{
          const x=40+i*160, y=180;
          return <g key={i}>
            <rect x={x} y={y} width={120} height={44} fill={BG} stroke={CUT} strokeWidth="1" rx={2}/>
            <text x={x+60} y={y+18} textAnchor="middle" fontFamily={S} fontWeight="700" fontSize={7} letterSpacing="3" fill={CREAM}>GLASS⏧GRASIE</text>
            <text x={x+60} y={y+30} textAnchor="middle" fontFamily={M} fontSize={5} fill="#8B7355">glassgrasie.nl</text>
          </g>;
        })}
        {/* Certified badge — row 3 */}
        {[0,1,2].map(i=>{
          const cx=90+i*160, cy=310;
          return <g key={i}>
            <circle cx={cx} cy={cy} r={50} fill={BG} stroke={CUT} strokeWidth="1"/>
            <circle cx={cx} cy={cy} r={42} fill="none" stroke="#8B7355" strokeWidth="0.6" strokeDasharray="3 2"/>
            <text x={cx} y={cy-10} textAnchor="middle" fontFamily={S} fontSize={5.5} letterSpacing="1.5" fill="#C9A87C">BLOCKCHAIN</text>
            <polygon points={`${cx},${cy} ${cx+8},${cy+8} ${cx},${cy+16} ${cx-8},${cy+8}`} fill="none" stroke="#C9A87C" strokeWidth="0.8"/>
            <text x={cx} y={cy+26} textAnchor="middle" fontFamily={S} fontSize={5.5} letterSpacing="1.5" fill="#C9A87C">VERIFIED</text>
          </g>;
        })}
        {/* Dimension */}
        <text x={280} y={430} textAnchor="middle" fontFamily={M} fontSize={7} fill="#aaa">A4 · 210 × 297mm · snijlijnen per sticker</text>
      </svg>
    </div>
  </div>
);

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>
      <DCSection id="box" title="Productdoos Dieline" subtitle="120×80×40mm · met snij- en vouwlijnen">
        <DCArtboard id="box-die" label="Doos — Platte uitslag" width={680} height={360}>
          <SmallBoxDieline/>
        </DCArtboard>
      </DCSection>
      <DCSection id="tag" title="Hangtag Dieline" subtitle="50×80mm · gat ⌀6mm">
        <DCArtboard id="tag-die" label="Hangtag — Snijvorm" width={380} height={340}>
          <HangtagDieline/>
        </DCArtboard>
      </DCSection>
      <DCSection id="bc" title="Visitekaartje Dieline" subtitle="85×55mm + 3mm afloop">
        <DCArtboard id="bc-die" label="Visitekaartje — Met afloop" width={440} height={320}>
          <BusinessCardDieline/>
        </DCArtboard>
      </DCSection>
      <DCSection id="stk" title="Stickervel Dieline" subtitle="A4 · 12 stickers · 3 varianten">
        <DCArtboard id="stk-die" label="Stickervel A4" width={580} height={460}>
          <StickerSheetDieline/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
