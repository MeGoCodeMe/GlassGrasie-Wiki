const M = "'JetBrains Mono',ui-monospace,monospace";

const YELLOW = '#F5C800';
const YELL2  = '#E6B800';
const WHITE  = '#F2EFE8';
const GREY   = '#C8C4BC';
const LGREY  = '#E8E4DC';
const DGREY  = '#3A3830';
const RED    = '#D42B2B';
const GOLD   = '#C9A87C';

// ── Shared graphic elements ──────────────────────────────────────────────────

// Hazard stripe bar
const HazardBar = ({ h=18, direction='h', color=YELLOW, bg=INK, w='100%' }) => {
  const stripeW = h * 1.2;
  return (
    <div style={{
      width: w, height: h, flexShrink:0,
      backgroundImage: `repeating-linear-gradient(${direction==='h'?'-45deg':'45deg'}, ${color} 0px, ${color} ${stripeW/2}px, ${bg} ${stripeW/2}px, ${bg} ${stripeW}px)`,
      flexShrink: 0,
    }}/>
  );
};

// Warning triangle
const WarnTriangle = ({ size=40, color=YELLOW }) => (
  <svg width={size} height={size} viewBox="0 0 40 40" style={{flexShrink:0}}>
    <polygon points="20,3 38,36 2,36" fill={color} stroke={INK} strokeWidth="1.5"/>
    <text x="20" y="31" textAnchor="middle" fontFamily={M} fontWeight="700" fontSize="18" fill={INK}>!</text>
  </svg>
);

// Barcode
const Barcode = ({ value='GG-2025-0042', w=120, h=40 }) => {
  const bars = Array.from({length:52},(_,i)=>(i*37+17)%13<6);
  const bw = w/52;
  return (
    <svg width={w} height={h+14} viewBox={`0 0 ${w} ${h+14}`}>
      <rect width={w} height={h+14} fill={WHITE}/>
      {bars.map((on,i)=>on&&<rect key={i} x={i*bw} y={2} width={bw-0.4} height={h} fill={INK}/>)}
      <text x={w/2} y={h+13} textAnchor="middle" fontFamily={M} fontSize="7" fill={INK}>{value}</text>
    </svg>
  );
};

// Handling icon — fragile
const IconFragile = ({ size=36 }) => (

    <text x="18" y="30" textAnchor="middle" fontFamily={M} fontSize="6" fill={GREY} letterSpacing="1">FRAGILE</text>
  </svg>
);

// Handling icon — arrows up
const IconUp = ({ size=36 }) => (
  <svg width={size} height={size} viewBox="0 0 36 36">

// Handling icon — keep dry

      {/* Shadow */}

        width:360,height:24,background:'rgba(0,0,0,0.5)',filter:'blur(12px)',borderRadius:'50%'}}/>
      <svg width={520} height={420} viewBox="0 0 520 420" style={{overflow:'visible'}}>

          {/* Front face gradient */}

// ── INDUSTRIAL DIELINE ──────────────────────────────────────────────────────
const IndustrialDieline = () => {
  const sc=1.4;
  const W=120, H=80, D=40, G=18;
  const CUT='#FF3B30', FOLD='#2196F3';
  const TW=(D+W+D+W+G)*sc, TH=(D+H+D)*sc;
  const p=n=>n*sc;

  return (
    <div style={{width:'100%',height:'100%',background:'#1a1818',overflow:'auto',padding:16}}>
      <div style={{fontFamily:M,fontSize:8,color:GREY,letterSpacing:'2px',textTransform:'uppercase',marginBottom:12}}>
        Dieline — 120×80×40mm · Industrial Black Box · Schaal 1:1.4
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:20,marginBottom:14,flexWrap:'wrap'}}>
        {[[CUT,'Snijlijn'],[FOLD,'Vouwlijn'],['#444','Bedrukgebied']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:20,height:2,background:c}}/>
            <span style={{fontFamily:M,fontSize:8,color:GREY}}>{l}</span>

        {/* Hazard stripes top */}
        {Array.from({length:20},(_,i)=>(
          <rect key={i} x={p(D)+i*10} y={p(D)} width={5} height={p(H)} fill={YELLOW} opacity="0.04"/>

        <rect x={p(D)} y={p(D)} width={p(W)} height={p(H)*0.18} fill={YELLOW} opacity="0.85"/>

        {['1× Fragment sieraad','1× Certificaat (papier)','1× NFT certificaat'].map((t,i)=>(

        {/* Warning panel on back */}

        <text x={p(D+W+D+W/2)} y={p(D)+93} textAnchor="middle" fontFamily={M} fontSize="6.5" fill={INK}>Niet gooien · Rechtop bewaren</text>

        {/* ── Fold lines ── */}
        {[p(D),p(D+W),p(D+W+D),p(D+W+D+W)].map(x=>(
          <line key={x} x1={x} y1={-10} x2={x} y2={TH+10} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>
        ))}
        <line x1={-10} y1={p(D)} x2={TW+10} y2={p(D)} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>
        <line x1={-10} y1={p(D+H)} x2={TW+10} y2={p(D+H)} stroke={FOLD} strokeWidth="0.8" strokeDasharray="4 3"/>

        {/* ── Cut lines ── */}
        <rect x={p(D)} y={0} width={p(W)} height={p(D)} stroke={CUT} strokeWidth="1" fill="none"/>
        <rect x={p(D+W+D)} y={0} width={p(W)} height={p(D)} stroke={CUT} strokeWidth="1" fill="none"/>
        <rect x={p(D)} y={p(D+H)} width={p(W)} height={p(D)} stroke={CUT} strokeWidth="1" fill="none"/>
        <rect x={p(D+W+D)} y={p(D+H)} width={p(W)} height={p(D)} stroke={CUT} strokeWidth="1" fill="none"/>
        <rect x={0} y={p(D)} width={p(D)} height={p(H)} stroke={CUT} strokeWidth="1" fill="none"/>
        <rect x={p(D+W)} y={p(D)} width={p(D)} height={p(H)} stroke={CUT} strokeWidth="1" fill="none"/>
        <rect x={p(D+W+D+W)} y={p(D)} width={p(G)} height={p(H)} stroke={CUT} strokeWidth="1" fill="none" strokeDasharray="3 2" opacity="0.7"/>

        {/* ── Dim labels ── */}
        {[[p(D),p(D+W),p(-20),`${W}mm`],[p(D+W+D),p(D+W+D+W),p(-20),`${W}mm`],[0,p(D),p(-20),`${D}mm`],[p(D+W),p(D+W+D),p(-20),`${D}mm`]].map(([x1,x2,y,l],i)=>(
          <g key={i}>
            <line x1={x1} y1={y+4} x2={x2} y2={y+4} stroke="#555" strokeWidth="0.5"/>
            <text x={(x1+x2)/2} y={y-2} textAnchor="middle" fontFamily={M} fontSize="7" fill="#777">{l}</text>
          </g>
        ))}
      </svg>

      {/* Print specs */}
      <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:1,background:'#333',maxWidth:600}}>
        {[['Materiaal','Golfkarton B-flute, 300gsm'],['Kleur','PMS Black 6C (mat laminaat)'],['Accent','PMS 109 C (geel) + wit'],['Hazard stripes','1×0 zeefdruk (UV)'],['Afwerking','Mat laminaat buitenzijde'],['Stempelsnijden','Tussenvorm uitsnede + rillen']].map(([k,v])=>(
          <React.Fragment key={k}>
            <div style={{background:'#1a1818',padding:'6px 10px',fontFamily:M,fontSize:8,color:'#666'}}>{k}</div>
            <div style={{background:'#111',padding:'6px 10px',fontFamily:M,fontSize:8,color:GREY,gridColumn:'span 1'}}>{v}</div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
};
