// ── QR generator (SVG-based) ───────────────────────────────────────────────
function QRPlaceholder({ value, size = 80 }) {
  // Simple deterministic dot pattern as placeholder
  const seed = value.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  const cells = 11;
  const cell = size / cells;
  const dots = [];
  for (let r = 0; r < cells; r++) {
    for (let c = 0; c < cells; c++) {
      const h = ((seed * (r+1) * (c+1) * 31) % 97);
      // Position detection squares
      const inCorner = (r<3&&c<3)||(r<3&&c>=cells-3)||(r>=cells-3&&c<3);
      const on = inCorner || h > 48;
      if (on) dots.push({ r, c });
    }
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <rect width={size} height={size} fill="#F0EAE0"/>
      {dots.map(({r,c},i) => (
        <rect key={i} x={c*cell+0.5} y={r*cell+0.5}
          width={cell-1} height={cell-1} fill="#0D0C0B"/>
      ))}
    </svg>
  );
}

  );
}

  const shipping = subtotal >= 200 ? 0 : 9.95;
  const total = subtotal + shipping;

  if (cart.length === 0) return (
    <div style={{minHeight:'80vh',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:24,padding:'48px'}}>

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView]       = React.useState(() =>
    localStorage.getItem('gg-store-view') || 'home');
  const [product, setProduct] = React.useState(null);
  const [cart, setCart]       = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('gg-store-cart') || '[]'); } catch { return []; }
  });

  React.useEffect(() => {
    localStorage.setItem('gg-store-view', view);
  }, [view]);

  React.useEffect(() => {
    localStorage.setItem('gg-store-cart', JSON.stringify(cart));
  }, [cart]);

  const addToCart = (p) => {
    setCart(prev => {
      const ex = prev.find(i => i.id === p.id);
      if (ex) return prev.map(i => i.id===p.id ? {...i,qty:i.qty+1} : i);
      return [...prev, {...p, qty:1}];
    });
  };

  const updateQty = (id, qty) => {
    if (qty <= 0) setCart(prev => prev.filter(i => i.id !== id));
    else setCart(prev => prev.map(i => i.id===id ? {...i,qty} : i));
  };

  const handleSelectProduct = (p) => {
    setProduct(p);
    setView('product');
    window.scrollTo({ top: 0 });
  };

  return (
    <div>
      <Navbar view={view} setView={setView} cart={cart}/>
      {view === 'home' && (
        <>
          <Hero setView={setView}/>
          <Catalogue onSelect={handleSelectProduct} onAddToCart={addToCart}/>
        </>
      )}
      {view === 'catalogue' && (
        <Catalogue onSelect={handleSelectProduct} onAddToCart={addToCart}/>
      )}
      {view === 'product' && product && (
        <ProductDetail p={product} onBack={() => setView('catalogue')} onAddToCart={addToCart}/>
      )}
      {view === 'checkout' && (
        <Checkout cart={cart} onUpdateQty={updateQty} onRemove={(id) => setCart(prev => prev.filter(i=>i.id!==id))}/>
      )}
      {view === 'about' && <About/>}
      <Footer setView={setView}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// ── Store Tweaks ──────────────────────────────────────────────────────────────
const STORE_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "cardHeight": 180,
  "accentMode": "brand",
  "showSku": true,
  "contrastBoost": false
}/*EDITMODE-END*/;

(function() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem('gg-store-tweaks') || '{}'); } catch {}
  const T = Object.assign({}, STORE_TWEAK_DEFAULTS, saved);

  function applyTweaks() {
    // Card height
    document.querySelectorAll('[data-product-img]').forEach(el => {
      el.style.height = T.cardHeight + 'px';
    });
    // Contrast boost: ensure text is readable
    if (T.contrastBoost) {
      document.querySelectorAll('[data-product-desc]').forEach(el => {
        el.style.opacity = '1';
        el.style.color = '#D4C9B8';
      });
    }
  }

  const panel = document.createElement('div');
  panel.id = 'store-tweaks';
  panel.style.cssText = 'display:none;position:fixed;bottom:24px;right:24px;z-index:9999;width:240px;background:#0A0908;border:1px solid #2C2418;font-family:\'Cormorant Garamond\',serif;color:#E8E2D8;box-shadow:0 8px 40px rgba(0,0,0,0.7);';
  panel.innerHTML = `
    <div style="padding:14px 18px 10px;border-bottom:1px solid #1C1810;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Syncopate',sans-serif;font-size:7px;letter-spacing:4px;color:#C9A87C;text-transform:uppercase;">Tweaks</span>
      <span style="font-family:'Syncopate',sans-serif;font-size:6px;letter-spacing:2px;color:#3A3020;">Store</span>
    </div>
    <div style="padding:16px 18px;display:flex;flex-direction:column;gap:16px;">
      <div>
        <label style="font-family:'Syncopate',sans-serif;font-size:6px;letter-spacing:3px;color:#8A8070;text-transform:uppercase;display:block;margin-bottom:8px;">Productkaart hoogte <span id="st-h-val">${T.cardHeight}</span>px</label>
        <input id="st-height" type="range" min="180" max="400" step="20" value="${T.cardHeight}" style="width:100%;accent-color:#C9A87C;cursor:pointer;">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:4px;border-top:1px solid #1C1810;">
        <span style="font-family:'Syncopate',sans-serif;font-size:6px;letter-spacing:3px;color:#8A8070;text-transform:uppercase;">Contrast boost</span>
        <button id="st-contrast" style="padding:5px 12px;font-family:'Syncopate',sans-serif;font-size:5px;letter-spacing:2px;border:1px solid #C9A87C;background:transparent;color:#C9A87C;cursor:pointer;text-transform:uppercase;">${T.contrastBoost ? 'Aan' : 'Uit'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(panel);

  panel.querySelector('#st-height').addEventListener('input', e => {
    T.cardHeight = +e.target.value;
    panel.querySelector('#st-h-val').textContent = T.cardHeight;
    try { localStorage.setItem('gg-store-tweaks', JSON.stringify(T)); } catch {}
    applyTweaks();
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: T }, '*');
  });

  panel.querySelector('#st-contrast').addEventListener('click', () => {
    T.contrastBoost = !T.contrastBoost;
    panel.querySelector('#st-contrast').textContent = T.contrastBoost ? 'Aan' : 'Uit';
    try { localStorage.setItem('gg-store-tweaks', JSON.stringify(T)); } catch {}
    applyTweaks();
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: T }, '*');
  });

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode')   panel.style.display = 'block';
    if (e.data?.type === '__deactivate_edit_mode') panel.style.display = 'none';
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  // Apply on load (after React renders)
  setTimeout(applyTweaks, 800);
})();
</script>
