// ── Status bar ─────────────────────────────────────────────────────────────
function StatusBar({ pct, color }) {
  return (
    <div style={{ width:'100%', height:2, background:'rgba(255,255,255,0.06)', borderRadius:1, overflow:'hidden' }}>
      <div style={{ width:`${pct}%`, height:'100%', background:color, borderRadius:1,
        transition:'width 0.6s ease', boxShadow:`0 0 6px ${color}44` }}/>
    </div>
  );
}

// ── Pillar card ─────────────────────────────────────────────────────────────
function PillarCard({ p, active, onSelect }) {
  const [hov, setHov] = React.useState(false);
  const isActive = active?.id === p.id;
  return (
    <div
      onClick={() => onSelect(isActive ? null : p)}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: isActive ? `rgba(${hexToRgb(p.color)},0.12)` : hov ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.015)',
        border: `1px solid ${isActive ? p.color + '55' : hov ? 'rgba(255,255,255,0.1)' : RULE}`,
        borderRadius: 2,
        padding: '18px 16px 14px',
        cursor: 'pointer',
        transition: 'all 180ms',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      {/* accent top bar */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height: isActive ? 2 : 1,
        background: isActive ? p.color : `${p.color}44`, transition:'height 180ms' }}/>

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
        <div style={{ fontFamily:SANS, fontSize:7, letterSpacing:'3px', color:p.color,
          textTransform:'uppercase' }}>
          {p.id} — {p.label}
        </div>
        <div style={{ fontFamily:MONO, fontSize:9, color:p.status >= 70 ? '#5A9A5A' :
          p.status >= 40 ? GOLD : '#7A4A4A', letterSpacing:'0.5px' }}>
          {p.status}%
        </div>
      </div>

      <div style={{ fontFamily:SERIF, fontSize:15, color:CREAM, fontWeight:400,
        lineHeight:1.2, marginBottom:10, letterSpacing:'-0.01em' }}>
        {p.name}
      </div>

      <StatusBar pct={p.status} color={p.color}/>

      <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginTop:10 }}>
        {p.tags.slice(0,3).map(t => (
          <span key={t} style={{ fontFamily:SANS, fontSize:6, letterSpacing:'1.5px',
            color:'rgba(232,226,216,0.75)', border:'1px solid rgba(255,255,255,0.07)',
            padding:'2px 6px', textTransform:'uppercase' }}>{t}</span>
        ))}
      </div>
    </div>
  );
}

// ── Flow diagram (SVG) ───────────────────────────────────────────────────────
function FlowDiagram({ pillars, onSelect }) {
  const W = 900, H = 320;
  // Position each pillar as a node
  const COLS = 4, ROWS = 3;
  const cw = W / COLS, rh = H / ROWS;
  const nodePos = {};
  pillars.forEach(p => {
    nodePos[p.id] = { x: p.col * cw + cw/2, y: p.row * rh + rh/2 };
  });

  const pillarById = {};
  pillars.forEach(p => { pillarById[p.id] = p; });

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%"
      style={{ display:'block', overflow:'visible' }}>
      {/* Connections */}
      {FLOW_CONNECTIONS.map((c, i) => {
        const from = nodePos[c.from], to = nodePos[c.to];
        if (!from || !to) return null;
        const fp = pillarById[c.from];
        const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
        const dx = to.x - from.x, dy = to.y - from.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        // shorten line so it doesn't overlap nodes
        const r = 28;
        const sx = from.x + dx/len*r, sy = from.y + dy/len*r;
        const ex = to.x   - dx/len*r, ey = to.y   - dy/len*r;
        return (
          <g key={i}>
            <defs>
              <marker id={`arr${i}`} markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                <path d="M0,0 L6,3 L0,6 Z" fill={fp?.color || GOLD} opacity="0.5"/>
              </marker>
            </defs>
            <line x1={sx} y1={sy} x2={ex} y2={ey}
              stroke={fp?.color || GOLD} strokeWidth="1" strokeDasharray="3 4"
              opacity="0.35" markerEnd={`url(#arr${i})`}/>
            <text x={mx} y={my-4} textAnchor="middle"
              fontFamily={MONO} fontSize="7" fill="rgba(232,226,216,0.85)" letterSpacing="1">
              {c.label}
            </text>
          </g>
        );
      })}
      {/* Nodes */}
      {pillars.map(p => {
        const pos = nodePos[p.id];
        return (
          <g key={p.id} style={{ cursor:'pointer' }} onClick={() => onSelect(p)}>
            <circle cx={pos.x} cy={pos.y} r={26} fill="#0D0C0A"
              stroke={p.color} strokeWidth="1" opacity="0.9"/>
            <circle cx={pos.x} cy={pos.y} r={26} fill={p.color} opacity="0.06"/>
            <text x={pos.x} y={pos.y - 7} textAnchor="middle"
              fontFamily={SANS} fontSize="8" fontWeight="700" fill={p.color} letterSpacing="1">
              {p.id}
            </text>
            <text x={pos.x} y={pos.y + 6} textAnchor="middle"
              fontFamily={SANS} fontSize="6" fill={CREAM} letterSpacing="1" opacity="0.7">
              {p.label.toUpperCase()}
            </text>
            {/* Progress arc */}
            <circle cx={pos.x} cy={pos.y} r={26}
              fill="none" stroke={p.color} strokeWidth="2"
              strokeDasharray={`${2*Math.PI*26 * p.status/100} ${2*Math.PI*26 * (1 - p.status/100)}`}
              strokeDashoffset={2*Math.PI*26 * 0.25}
              opacity="0.5"/>
          </g>
        );
      })}
    </svg>
  );
}

// helper
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ── Cymatics mini-preview ────────────────────────────────────────────────────
function CymaticsPreview({ color }) {
  const canvasRef = React.useRef(null);
  const [freq, setFreq] = React.useState(440);
  const [layer, setLayer] = React.useState(1);
  const rafRef = React.useRef(null);
  const tRef = React.useRef(0);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const draw = () => {
      tRef.current += 0.012;
      const t = tRef.current;
      ctx.fillStyle = '#09080A';
      ctx.fillRect(0, 0, W, H);

      const m = freq / 80;
      const n = layer + 1.5;
      const img = ctx.createImageData(W, H);
      const d = img.data;

      for (let px = 0; px < W; px++) {
        for (let py = 0; py < H; py++) {
          const x = (px / W - 0.5) * 2;
          const y = (py / H - 0.5) * 2;
          // Chladni: |cos(m·π·x)·cos(n·π·y) - cos(n·π·x)·cos(m·π·y)|
          const val = Math.abs(
            Math.cos(m * Math.PI * x) * Math.cos(n * Math.PI * y) -
            Math.cos(n * Math.PI * x) * Math.cos(m * Math.PI * y + t * 0.3)
          );
          const thresh = 0.08 + 0.03 * Math.sin(t);
          const bright = val < thresh ? Math.pow(1 - val / thresh, 2.5) : 0;
          const idx = (py * W + px) * 4;
          // Use pillar color tint
          d[idx]   = Math.round(bright * 200);
          d[idx+1] = Math.round(bright * 160);
          d[idx+2] = Math.round(bright * 100);
          d[idx+3] = Math.round(bright * 220);
        }
      }
      ctx.putImageData(img, 0, 0);

      // Overlay labels
      ctx.fillStyle = 'rgba(139,115,85,0.6)';
      ctx.font = `600 9px ${MONO}`;
      ctx.fillText(`${freq} Hz`, 10, 16);
      ctx.fillText(`M1 Composer`, 10, H - 10);

      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(rafRef.current);
  }, [freq, layer]);

  return (
    <div style={{ marginBottom:24 }}>
      <div style={{ fontFamily:SANS, fontSize:7, letterSpacing:'3px', color:GOLD,
        textTransform:'uppercase', marginBottom:10 }}>Cymatics Live Preview</div>
      <canvas ref={canvasRef} width={312} height={180}
        style={{ width:'100%', borderRadius:2, border:`1px solid ${RULE}`, display:'block' }}/>
      <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:8 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontFamily:SANS, fontSize:6, letterSpacing:'2px', color:'rgba(232,226,216,0.72)', textTransform:'uppercase', width:50 }}>Freq</span>
          <input type="range" min={200} max={1400} step={10} value={freq}
            onChange={e => setFreq(+e.target.value)}
            style={{ flex:1, accentColor:GOLD_HI, cursor:'pointer' }}/>
          <span style={{ fontFamily:MONO, fontSize:10, color:GOLD_HI, width:46, textAlign:'right' }}>{freq} Hz</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontFamily:SANS, fontSize:6, letterSpacing:'2px', color:'rgba(232,226,216,0.72)', textTransform:'uppercase', width:50 }}>Laag m</span>
          <input type="range" min={1} max={6} step={1} value={layer}
            onChange={e => setLayer(+e.target.value)}
            style={{ flex:1, accentColor:GOLD_HI, cursor:'pointer' }}/>
          <span style={{ fontFamily:MONO, fontSize:10, color:GOLD_HI, width:46, textAlign:'right' }}>n={layer+1}</span>
        </div>
      </div>
    </div>
  );
}
